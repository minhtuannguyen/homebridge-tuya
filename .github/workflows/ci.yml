name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        homebridge-tag: [latest, beta]
    name: node ${{ matrix.node-version }} / homebridge@${{ matrix.homebridge-tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install plugin deps
        run: npm install --no-audit --no-fund
      - name: Install homebridge ${{ matrix.homebridge-tag }} + hap-nodejs
        run: |
          if [ "${{ matrix.homebridge-tag }}" = "beta" ]; then
            npm install --no-save --no-audit --no-fund homebridge@beta hap-nodejs@^1
          else
            npm install --no-save --no-audit --no-fund homebridge@latest hap-nodejs@^0.12 || \
            npm install --no-save --no-audit --no-fund homebridge@latest hap-nodejs
          fi
      - name: Smoke test
        run: npm test
